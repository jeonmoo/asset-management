<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>자산 목록</title>
    <th:block th:replace="~{layout/layout :: header}"></th:block>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${message}">메시지 내용</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <h2>자산 목록 조회</h2>

    <!-- 검색조건 -->
    <form th:action="@{/assets}" th:object="${condition}" method="get" class="row g-3 mb-4 align-items-center">
        <div class="col-md-3">
            <input type="text" th:field="*{q}" class="form-control" placeholder="검색어 입력">
        </div>
        <div class="col-md-2">
            <select th:field="*{category}" class="form-select">
                <option value="">카테고리 전체</option>
                <option th:each="cat : ${T(com.example.assetManagement.domain.asset.enums.Category).values()}"
                        th:value="${cat}" th:text="${cat.description}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <select th:field="*{status}" class="form-select">
                <option value="">상태 전체</option>
                <option th:each="stat : ${T(com.example.assetManagement.domain.asset.enums.AssetStatus).values()}"
                        th:value="${stat}" th:text="${stat.description}"></option>
            </select>
        </div>

        <div class="col-md-1">
            <button type="submit" class="btn btn-secondary">검색</button>
        </div>

        <div class="col-md-2 ms-auto text-end">
            <a href="/assets/new" class="btn btn-primary">자산 등록</a>
        </div>
    </form>

    <!-- 테이블 -->
    <table class="table table-hover mt-3">
        <thead class="table-light">
        <tr>
            <th>자산번호</th>
            <th>이름</th>
            <th>카테고리</th>
            <th>상태</th>
            <th>등록일</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="asset : ${assets}">
            <td th:text="${asset.assetNo}">IT-2026-0001</td>

            <td>
                <a th:href="@{/assets/{assetId}(assetId=${asset.id})}"
                   th:text="${asset.name}">노트북</a>
            </td>

            <td th:text="${asset.category}">LAPTOP</td>

            <td>
                <span class="badge bg-secondary" th:text="${asset.status}">보유 중</span>
            </td>

            <td th:text="${#temporals.format(asset.createdAt, 'yyyy-MM-dd')}">2026-03-11</td>

            <td>
                <form th:action="@{/assets/{id}/delete(id=${asset.id})}" method="post"
                      onsubmit="return confirm('정말 삭제하시겠습니까?');">
                    <input type="hidden" name="q" th:value="${condition.q}">
                    <input type="hidden" name="category" th:value="${condition.category}">
                    <input type="hidden" name="status" th:value="${condition.status}">
                    <input type="hidden" name="page" th:value="${page.number}">
                    <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- 페이징 -->
    <nav aria-label="Page navigation" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link" th:href="@{/assets(page=${page.number - 1})}">이전</a>
            </li>

            <li class="page-item" th:each="pageNum : ${#numbers.sequence(
            (page.number - 2 < 0 ? 0 : page.number - 2),
            (page.number + 2 >= page.totalPages ? (page.totalPages == 0 ? 0 : page.totalPages - 1) : page.number + 2))}"
                th:classappend="${pageNum == page.number} ? 'active'">
                <a class="page-link" th:href="@{/assets(page=${pageNum})}" th:text="${pageNum + 1}">1</a>
            </li>

            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link" th:href="@{/assets(page=${page.number + 1})}">다음</a>
            </li>
        </ul>
    </nav>

    <th:block th:replace="~{layout/layout :: footer}"></th:block>
</div>

</body>
</html>
