<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>자산 상세 정보</title>
  <th:block th:replace="~{layout/layout :: header}"></th:block>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-5">
  <h2>자산 상세 정보</h2>

  <div class="d-flex mt-3">
    <div>
      <a th:if="${asset.status.name() == 'IN_STOCK'}"
         th:href="@{/assets/{assetId}/assign(assetId=${asset.id})}" class="btn btn-primary">할당</a>

      <form th:if="${asset.status.name() == 'ASSIGNED'}"
            th:action="@{/assets/{assetId}/return(assetId=${asset.id})}"
            method="post" style="display: inline;">
        <button type="submit" class="btn btn-warning">회수</button>
      </form>

      <a th:if="${asset.status.name() != 'REPAIR'}"
         th:href="@{/assets/{assetId}/assign(assetId=${asset.id})}" class="btn btn-primary">수리</a>

      <a th:if="${asset.status.name() == 'REPAIR'}"
         th:href="@{/assets/{assetId}/assign(assetId=${asset.id})}" class="btn btn-primary">수리 완료</a>
    </div>

    <div class="ms-auto">
      <a th:href="@{/assets/{assetId}/edit(assetId=${asset.id})}" class="btn btn-outline-primary">수정</a>
    </div>
  </div>

  <div class="card mt-4">
    <div class="card-body">
      <dl class="row">
        <dt class="col-sm-3">자산번호</dt>
        <dd class="col-sm-9" th:text="${asset.assetNo}"></dd>

        <dt class="col-sm-3">자산명</dt>
        <dd class="col-sm-9" th:text="${asset.name}"></dd>

        <dt class="col-sm-3">시리얼번호</dt>
        <dd class="col-sm-9" th:text="${asset.serialNo}"></dd>

        <dt class="col-sm-3">카테고리</dt>
        <dd class="col-sm-9" th:text="${asset.category}"></dd>

        <dt class="col-sm-3">상태</dt>
        <dd class="col-sm-9" th:text="${asset.status}"></dd>

        <dt class="col-sm-3">구매일</dt>
        <dd class="col-sm-9" th:text="${#temporals.format(asset.purchasedAt, 'yyyy-MM-dd')}"></dd>

        <dt class="col-sm-3">등록일</dt>
        <dd class="col-sm-9" th:text="${#temporals.format(asset.createdAt, 'yyyy-MM-dd')}"></dd>

        <dt class="col-sm-3">최종수정일</dt>
        <dd class="col-sm-9" th:text="${asset.updatedAt != null ? #temporals.format(asset.updatedAt, 'yyyy-MM-dd') : '-'}"></dd>

        <dt class="col-sm-3">메모</dt>
        <dd class="col-sm-9" th:text="${asset.memo} ?: '입력된 메모가 없습니다.'"></dd>
    </div>
  </div>

  <h3 class="mt-5">할당 이력</h3>
  <table class="table table-hover mt-3">
    <thead>
    <tr>
      <th>사용자</th>
      <th>할당일</th>
      <th>반납일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="history : ${asset.histories}">
      <td th:text="${history.assigneeName}">홍길동</td>
      <td th:text="${#temporals.format(history.assignedAt, 'yyyy-MM-dd')}">2026-03-11</td>
      <td th:text="${history.returnedAt != null ? #temporals.format(history.returnedAt, 'yyyy-MM-dd') : '-'}">-</td>
    </tr>
    </tbody>
  </table>

</div>
<th:block th:replace="~{layout/layout :: footer}"></th:block>
</body>
</html>
