<!DOCTYPE html>

        <li class="nav-item"><a class="nav-link" href="/assets">자산</a></li>
        <li class="nav-item">
          <form action="/logout" method="post" class="d-inline">
            <input type="hidden"

          </form>

      </ul>
    </div>
